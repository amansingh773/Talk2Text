<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceTask - Premium Voice Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-bg">
        <div class="gradient-1"></div>
        <div class="gradient-2"></div>
        <div class="gradient-3"></div>
    </div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="sidebar-logo">
                    <div class="logo-icon">🎤</div>
                    <span>Talk2Task</span>
                </div>
                <button id="themeToggle" class="theme-toggle-sidebar" aria-label="Toggle dark mode">
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>

            <div class="sidebar-section">
                <div class="section-header">
                    <h3>📋 History</h3>
                    <button id="clearHistoryBtn" class="clear-btn" title="Clear all history">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 4 21 4 23 6 23 20a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V6"></polyline>
                            <line x1="10" y1="11" x2="10" y2="17"></line>
                            <line x1="14" y1="11" x2="14" y2="17"></line>
                        </svg>
                    </button>
                </div>
                <div id="historyList" class="history-list">
                    <div class="empty-state">No history yet</div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="main-wrapper">
            <!-- Top Navigation -->
            <nav class="top-nav">
                <div class="nav-content">
                    <h1 class="page-title">Talk 2 Task</h1>
                    <p class="page-subtitle">Convert your speech into actionable tasks</p>
                </div>
            </nav>

            <!-- Main Content Area -->
            <main class="main-content">
                <div class="content-grid">
                    <!-- Voice Recording Card -->
                    <div class="card voice-card glass-effect">
                        <div class="card-header">
                            <h2>🎙️ Start Recording</h2>
                            <p>Click the button below and speak your task</p>
                        </div>

                        <div class="voice-section">
                            <!-- Microphone Button -->
                            <div class="mic-wrapper">
                                <button id="micBtn" class="mic-btn" aria-label="Start recording">
                                    <svg class="mic-icon" viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                                        <path d="M17 16.91c-1.48 1.46-3.51 2.36-5.7 2.36-2.19 0-4.22-.9-5.7-2.36M19 21H5v-2h14v2z"/>
                                    </svg>
                                    <div class="pulse-ring"></div>
                                </button>
                                <p id="status" class="status-text">Tap to speak</p>
                            </div>

                            <!-- Transcript Display -->
                            <div class="transcript-container">
                                <div id="textBox" class="transcript-text"></div>
                            </div>

                            <!-- Action Buttons -->
                            <div class="button-group">
                                <button id="saveBtn" class="btn btn-primary">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                                        <polyline points="17 21 17 13 7 13 7 21"></polyline>
                                        <polyline points="7 3 7 8 15 8"></polyline>
                                    </svg>
                                    Save Task
                                </button>
                                <button id="clearBtn" class="btn btn-secondary">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="3 6 5 4 21 4 23 6 23 20a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V6"></polyline>
                                        <line x1="10" y1="11" x2="10" y2="17"></line>
                                        <line x1="14" y1="11" x2="14" y2="17"></line>
                                    </svg>
                                    Clear
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Tasks List Card -->
                    <div class="card tasks-card glass-effect">
                        <div class="card-header">
                            <h2>📝 Today's Tasks</h2>
                            <span id="taskCount" class="task-badge">0</span>
                        </div>

                        <div id="tasksContainer" class="tasks-list">
                            <div class="empty-state">No tasks yet. Start speaking!</div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
